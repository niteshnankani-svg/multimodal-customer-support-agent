version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=sqlite:///./complaints.db
    depends_on:
      - redis
    volumes:
      - ./uploads:/code/uploads
      - ./complaints.db:/code/complaints.db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"